<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main>
    <section id="hero" class="section hero">
      <div class="hero-content">
        <h1 id="hero-title"></h1>
        <p id="hero-name"></p>
      </div>
    </section>

    <section id="works" class="section works">
      <div class="works-inner">
        <h2>Works</h2>
        <div id="works-grid" class="works-grid"></div>
      </div>
    </section>
  </main>

  <div
    id="work-modal"
    class="modal"
    role="dialog"
    aria-modal="true"
    aria-hidden="true"
    aria-labelledby="modal-work-title"
  >
    <div class="modal-overlay" data-modal-close></div>
    <div class="modal-content">
      <button type="button" class="modal-close" data-modal-close aria-label="Close">x</button>
      <h3 id="modal-work-title"></h3>
      <div class="modal-page">
        <div class="modal-layout">
          <div class="modal-left">
            <div class="modal-media">
              <img id="modal-page-image" class="modal-page-image is-hidden" src="" alt="">
              <div id="modal-page-image-fallback" class="image-fallback">No Image</div>
            </div>
            <div class="modal-links">
              <div class="modal-link-row">
                <span class="modal-link-label">github:</span>
                <a id="modal-github-link" class="modal-link-value is-disabled">-</a>
              </div>
              <div class="modal-link-row">
                <span id="modal-secondary-link-label" class="modal-link-label">githubpages:</span>
                <a id="modal-github-pages-link" class="modal-link-value is-disabled">-</a>
              </div>
            </div>
          </div>
          <div class="modal-right">
            <h4 id="modal-page-heading"></h4>
            <p id="modal-page-body"></p>
          </div>
        </div>
      </div>
      <div class="modal-nav">
        <button id="modal-prev" type="button" aria-label="Previous page">Prev</button>
        <div id="modal-dots" class="modal-dots"></div>
        <button id="modal-next" type="button" aria-label="Next page">Next</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
